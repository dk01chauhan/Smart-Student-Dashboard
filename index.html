<!DOCTYPE html>
<html>
<head>
    <title>Smart Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Register</h2>

<!-- Role Selection -->
<select id="role" onchange="toggleForm()">
    <option value="">Select Role</option>
    <option value="student">Student</option>
    <option value="faculty">Faculty</option>
</select>

<!-- Common Fields -->
<div id="commonFields" style="display:none;">
    <label>Name:</label>
    <input type="text" id="name">

    <label>Mobile No.:</label>
    <input type="text" id="mobile">

    <label>Email:</label>
    <input type="email" id="email">

    <label>University Name:</label>
    <input type="text" id="university">

    <label>University ID:</label>
    <input type="text" id="university_id">

    <label>Password:</label>
    <input type="password" id="password">
</div>

<!-- Student Fields -->
<div id="studentFields" style="display:none;">
    <label>Father Name:</label>
    <input type="text" id="father_name">

    <label>Course:</label>
    <input type="text" id="course">
</div>

<!-- Faculty Fields -->
<div id="facultyFields" style="display:none;">
    <!-- Faculty has no extra fields now -->
</div>

<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>



<input type="text" id="login_id" placeholder="University ID">
<input type="password" id="login_pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script src="script.js"></script>

</body>
</html>
